<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outcomes Developing</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Poppins', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: #ffffff;
            color: #050830;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .container {
            text-align: center;
            padding: 2rem;
            max-width: 600px;
        }

        .logo {
            margin-bottom: 3rem;
        }

        .logo-text {
            font-size: 2.4rem;
            letter-spacing: -0.5px;
            color: #050830;
        }

        .logo-text .light { font-weight: 300; }
        .logo-text .bold { font-weight: 700; }
        .logo-text .dot { color: #2D8C6F; font-weight: 700; }

        .divider {
            width: 60px;
            height: 3px;
            background-color: #2D8C6F;
            margin: 0 auto 2rem;
        }

        h1 {
            font-size: 1.1rem;
            font-weight: 400;
            color: #6b6e8a;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            margin-bottom: 1.5rem;
        }

        .tagline {
            font-size: 0.95rem;
            color: #9a9cb8;
            font-weight: 300;
            line-height: 1.6;
        }

        .tagline a {
            color: #2D8C6F;
            text-decoration: none;
            font-weight: 400;
        }

        .tagline a:hover {
            text-decoration: underline;
        }

        .footer {
            position: fixed;
            bottom: 2rem;
            font-size: 0.75rem;
            color: #c0c2d6;
            letter-spacing: 0.05em;
        }

        @media (max-width: 480px) {
            .logo-text { font-size: 1.8rem; }
            h1 { font-size: 0.95rem; }
            .container { padding: 1.5rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">
            <span class="logo-text">
                <span class="light">Quantum</span><span class="bold">Colleagues</span><span class="dot">.</span>
            </span>
        </div>

        <div class="divider"></div>

        <h1>Outcomes Developing</h1>

        <p class="tagline">
            Human-AI Agent Working. AI Training for every generation.<br>
            <a href="mission.html">Our Mission</a>
        </p>
    </div>

    <div class="footer">quantumcolleagues.org</div>
</body>
  </html>
